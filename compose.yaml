services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
    ports:
      - "5432:5432"
    volumes:
      - chatbot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 3s
      timeout: 3s
      retries: 15

  api:
    build: .
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://chatbot:chatbot@postgres:5432/chatbot
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >-
      sh -c "alembic upgrade head && python -m app.infrastructure.seed &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  chatbot_postgres_data:

