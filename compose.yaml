services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
    ports:
      - "5432:5432"
    volumes:
      - chatbot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 3s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - chatbot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 15

  api:
    build: .
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://chatbot:chatbot@postgres:5432/chatbot
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6-sol}
      OPENAI_PROMPT_VERSION: ${OPENAI_PROMPT_VERSION:-intent-router-v1}
      LLM_MINIMUM_CONFIDENCE: ${LLM_MINIMUM_CONFIDENCE:-0.72}
      TENANT_SECRET_KEY: ${TENANT_SECRET_KEY:-}
      UPLOAD_DIR: /data/uploads
      MAX_UPLOAD_BYTES: 10485760
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@serviceflow.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-ServiceFlow-local-2026!}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-12}
    ports:
      - "8000:8000"
    volumes:
      - chatbot_uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 10s
      timeout: 3s
      retries: 15
    command: >-
      sh -c "alembic upgrade head && python -m app.infrastructure.seed &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build: .
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://chatbot:chatbot@postgres:5432/chatbot
      REDIS_URL: redis://redis:6379/0
      CONSUMER_GROUP: chatbot_workers
      MAX_EVENT_RETRIES: 3
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6-sol}
      OPENAI_PROMPT_VERSION: ${OPENAI_PROMPT_VERSION:-intent-router-v1}
      LLM_MINIMUM_CONFIDENCE: ${LLM_MINIMUM_CONFIDENCE:-0.72}
      TENANT_SECRET_KEY: ${TENANT_SECRET_KEY:-}
      UPLOAD_DIR: /data/uploads
      MAX_UPLOAD_BYTES: 10485760
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.worker
    restart: unless-stopped
    volumes:
      - chatbot_uploads:/data/uploads

volumes:
  chatbot_postgres_data:
  chatbot_redis_data:
  chatbot_uploads:
