name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: pip install -e '.[dev]'
      - name: Compile Python
        run: python -m compileall -q app migrations tests
      - name: Run tests
        run: pytest -q
      - name: Validate migration SQL
        run: alembic upgrade head --sql > /tmp/chatbot-migration.sql

  cloudflare:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: cloudflare/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check and test Worker
        run: npm run check
      - name: Audit production dependencies
        run: npm audit --omit=optional
